name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and mint an OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -d assets

          rm -rf _site
          mkdir -p _site

          # Copy the whole site as-is, then prune files that must not ship.
          cp -R --no-preserve=mode,ownership ./. _site/

          rm -rf \
            _site/.git \
            _site/.github \
            _site/test \
            _site/node_modules \
            _site/deploy-pages.yml \
            _site/package.json
          rm -f _site/*.zip

          # Disable Jekyll on the published artifact regardless of file naming.
          touch _site/.nojekyll

          if find _site -type l -print -quit | grep -q .; then
            echo "::error::The Pages artifact contains a symbolic link."
            exit 1
          fi

          chmod -R u+rwX,go+rX _site
          test -f _site/index.html
          test -d _site/assets
          test -f _site/.nojekyll
          du -sh _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -d assets

          rm -rf _site
          mkdir -p _site
          cp --no-preserve=mode,ownership index.html _site/index.html
          cp -R --no-preserve=mode,ownership assets _site/assets

          if find _site -type l -print -quit | grep -q .; then
            echo "::error::The Pages artifact contains a symbolic link."
            exit 1
          fi

          chmod -R u+rwX,go+rX _site
          test -f _site/index.html
          test -d _site/assets
          du -sh _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
